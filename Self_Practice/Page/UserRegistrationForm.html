<!DOCTYPE html>
<html lang="en-US">

<head>
    <title>User Registration Form</title>
    <link rel="stylesheet" href="../Design/Style.css">
</head>

<body>

    <h1>User Registration Form</h1>

    <form>

        <fieldset>
            <legend>Personal Information</legend>

            <table>
                <tr>
                    <td><label for="firstName">First Name *</label></td>
                    <td><input type="text" id="firstName" name="firstName"></td>
                </tr>

                <tr>
                    <td><label for="lastName">Last Name *</label></td>
                    <td><input type="text" id="lastName" name="lastName"></td>
                </tr>

                <tr>
                    <td><label for="dob">Date of Birth *</label></td>
                    <td><input type="date" id="dob" name="dob"></td>
                </tr>

                <tr>
                    <td>Gender *</td>
                    <td>
                        <input type="radio" id="male" name="gender">
                        <label for="male">Male</label>

                        <input type="radio" id="female" name="gender">
                        <label for="female">Female</label>

                        <input type="radio" id="other" name="gender">
                        <label for="other">Other</label>
                    </td>
                </tr>
            </table>
        </fieldset>

        <fieldset>
            <legend>Contact Information</legend>

            <table>
                <tr>
                    <td><label for="email">Email Address *</label></td>
                    <td><input type="email" id="email" name="email"></td>
                </tr>

                <tr>
                    <td><label for="phone">Phone Number *</label></td>
                    <td><input type="text" id="phone" name="phone"></td>
                </tr>

                <tr>
                    <td><label for="address">Address</label></td>
                    <td><textarea id="address" name="address" rows="4" cols="25"></textarea></td>
                </tr>

                <tr>
                    <td><label for="country">Country</label></td>
                    <td>
                        <select id="country" name="country">
                            <option>Select Country</option>
                            <option>Bangladesh</option>
                            <option>India</option>
                            <option>USA</option>
                            <option>Argentina</option>
                        </select>
                    </td>
                </tr>
            </table>
        </fieldset>

        <fieldset>
            <legend>Account Information</legend>

            <table>
                <tr>
                    <td><label for="username">Username *</label></td>
                    <td><input type="text" id="username" name="username"></td>
                </tr>

                <tr>
                    <td><label for="password">Password *</label></td>
                    <td><input type="password" id="password" name="password"></td>
                </tr>

                <tr>
                    <td><label for="confirmPassword">Confirm Password *</label></td>
                    <td><input type="password" id="confirmPassword" name="confirmPassword"></td>
                </tr>
            </table>
        </fieldset>

        <fieldset>
            <legend>Preferences</legend>

            <table>
                <tr>
                    <td>Interests</td>
                    <td>
                        <input type="checkbox" id="sports" name="interests">
                        <label for="sports">Sports</label>

                        <input type="checkbox" id="music" name="interests">
                        <label for="music">Music</label>

                        <br>

                        <input type="checkbox" id="reading" name="interests">
                        <label for="reading">Reading</label>

                        <input type="checkbox" id="technology" name="interests">
                        <label for="technology">Technology</label>
                    </td>
                </tr>
            </table>
        </fieldset>

        <input type="checkbox" id="terms" name="terms">
        <label for="terms">I agree to the Terms and Conditions *</label>

        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Clear Form">

    </form>

</body>

</html>
